<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=300">
<meta name="ad.size" content="width=300,height=600">
<title>GitHub Slideshow — Half Page 300x600</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 300px; height: 600px; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .ad {
    width: 300px; height: 600px;
    background: linear-gradient(170deg, #002b36 0%, #073642 50%, #002b36 100%);
    display: flex; flex-direction: column; align-items: center;
    padding: 36px 28px;
    border: 1px solid #586e75;
    cursor: pointer;
    text-decoration: none; color: inherit;
    text-align: center;
  }
  .logo {
    width: 72px; height: 72px;
    background: #268bd2; border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; color: #fdf6e3; font-weight: 700;
    margin-bottom: 24px;
  }
  h2 { font-size: 24px; color: #93a1a1; font-weight: 700; letter-spacing: -0.5px; }
  .tagline { font-size: 14px; color: #839496; margin-top: 10px; line-height: 1.5; }
  .divider {
    width: 50px; height: 2px; background: #268bd2;
    margin: 28px 0; border-radius: 1px;
  }
  .features { width: 100%; text-align: left; }
  .feature-item {
    display: flex; align-items: flex-start; gap: 12px;
    margin-bottom: 16px;
  }
  .feature-icon {
    width: 32px; height: 32px; min-width: 32px;
    background: rgba(38, 139, 210, 0.15); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: #268bd2;
  }
  .feature-text h3 { font-size: 13px; color: #93a1a1; font-weight: 600; }
  .feature-text p { font-size: 11px; color: #839496; margin-top: 2px; line-height: 1.3; }
  .cta {
    background: #268bd2; color: #fdf6e3;
    padding: 14px 36px; border-radius: 8px;
    font-size: 15px; font-weight: 600;
    margin-top: auto;
    display: inline-block;
  }
  .sub { font-size: 11px; color: #586e75; margin-top: 10px; }
</style>
</head>
<body>
  <a class="ad" href="https://github.com/andytischen/github-slideshow" target="_blank" rel="noopener">
    <div class="logo">GS</div>
    <h2>GitHub Slideshow</h2>
    <p class="tagline">Master Git &amp; GitHub through<br>interactive presentations</p>
    <div class="divider"></div>
    <div class="features">
      <div class="feature-item">
        <div class="feature-icon">&#9654;</div>
        <div class="feature-text">
          <h3>Interactive Slides</h3>
          <p>Hands-on learning with reveal.js</p>
        </div>
      </div>
      <div class="feature-item">
        <div class="feature-icon">&#128736;</div>
        <div class="feature-text">
          <h3>Fully Customizable</h3>
          <p>Fork and make it your own</p>
        </div>
      </div>
      <div class="feature-item">
        <div class="feature-icon">&#127760;</div>
        <div class="feature-text">
          <h3>Open Source</h3>
          <p>Free forever on GitHub</p>
        </div>
      </div>
    </div>
    <div class="cta">Get Started &rarr;</div>
    <p class="sub">Free &amp; open source</p>
  </a>
</body>
</html>
