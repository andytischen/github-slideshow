<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=970">
<meta name="ad.size" content="width=970,height=90">
<title>GitHub Slideshow — Large Leaderboard 970x90</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 970px; height: 90px; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .ad {
    width: 970px; height: 90px;
    background: linear-gradient(135deg, #002b36 0%, #073642 40%, #002b36 100%);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 36px;
    border: 1px solid #586e75;
    cursor: pointer;
    text-decoration: none; color: inherit;
  }
  .ad-left { display: flex; align-items: center; gap: 22px; }
  .logo {
    width: 52px; height: 52px;
    background: #268bd2; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: #fdf6e3; font-weight: 700;
    flex-shrink: 0;
  }
  .text h2 { font-size: 20px; color: #93a1a1; font-weight: 700; letter-spacing: -0.3px; }
  .text p { font-size: 14px; color: #839496; margin-top: 3px; }
  .features {
    display: flex; gap: 24px; align-items: center;
  }
  .feature {
    text-align: center; color: #839496; font-size: 11px;
  }
  .feature .num {
    font-size: 22px; font-weight: 700; color: #268bd2;
    display: block;
  }
  .divider { width: 1px; height: 40px; background: #586e75; }
  .cta {
    background: #268bd2; color: #fdf6e3;
    padding: 12px 28px; border-radius: 6px;
    font-size: 14px; font-weight: 600;
    white-space: nowrap; flex-shrink: 0;
  }
</style>
</head>
<body>
  <a class="ad" href="https://github.com/andytischen/github-slideshow" target="_blank" rel="noopener">
    <div class="ad-left">
      <div class="logo">GS</div>
      <div class="text">
        <h2>GitHub Slideshow</h2>
        <p>Interactive presentations for learning Git &amp; GitHub</p>
      </div>
    </div>
    <div class="features">
      <div class="divider"></div>
      <div class="feature"><span class="num">&#9654;</span>reveal.js</div>
      <div class="feature"><span class="num">&#128218;</span>Open Source</div>
      <div class="feature"><span class="num">&#9881;</span>Forkable</div>
      <div class="divider"></div>
    </div>
    <div class="cta">Start Learning &rarr;</div>
  </a>
</body>
</html>
