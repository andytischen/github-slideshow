<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=300">
<meta name="ad.size" content="width=300,height=250">
<title>GitHub Slideshow — Medium Rectangle 300x250</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 300px; height: 250px; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .ad {
    width: 300px; height: 250px;
    background: linear-gradient(160deg, #002b36 0%, #073642 60%, #002b36 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px;
    border: 1px solid #586e75;
    cursor: pointer;
    text-decoration: none; color: inherit;
    text-align: center;
  }
  .logo {
    width: 56px; height: 56px;
    background: #268bd2; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: #fdf6e3; font-weight: 700;
    margin-bottom: 16px;
  }
  h2 { font-size: 20px; color: #93a1a1; font-weight: 700; letter-spacing: -0.3px; }
  p { font-size: 13px; color: #839496; margin-top: 8px; line-height: 1.4; }
  .cta {
    background: #268bd2; color: #fdf6e3;
    padding: 10px 28px; border-radius: 6px;
    font-size: 14px; font-weight: 600;
    margin-top: 18px;
    display: inline-block;
  }
</style>
</head>
<body>
  <a class="ad" href="https://github.com/andytischen/github-slideshow" target="_blank" rel="noopener">
    <div class="logo">GS</div>
    <h2>GitHub Slideshow</h2>
    <p>Master Git &amp; GitHub through<br>interactive slide decks</p>
    <div class="cta">Start Learning &rarr;</div>
  </a>
</body>
</html>
