<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=160">
<meta name="ad.size" content="width=160,height=600">
<title>GitHub Slideshow — Wide Skyscraper 160x600</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 160px; height: 600px; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .ad {
    width: 160px; height: 600px;
    background: linear-gradient(180deg, #002b36 0%, #073642 50%, #002b36 100%);
    display: flex; flex-direction: column; align-items: center;
    padding: 30px 14px;
    border: 1px solid #586e75;
    cursor: pointer;
    text-decoration: none; color: inherit;
    text-align: center;
  }
  .logo {
    width: 64px; height: 64px;
    background: #268bd2; border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; color: #fdf6e3; font-weight: 700;
    margin-bottom: 24px;
  }
  h2 { font-size: 17px; color: #93a1a1; font-weight: 700; line-height: 1.3; }
  .divider {
    width: 40px; height: 2px; background: #268bd2;
    margin: 20px 0; border-radius: 1px;
  }
  p { font-size: 12px; color: #839496; line-height: 1.5; }
  .features {
    margin-top: 24px; text-align: left; width: 100%;
  }
  .features li {
    font-size: 11px; color: #839496; margin-bottom: 10px;
    list-style: none; padding-left: 16px; position: relative;
    line-height: 1.3;
  }
  .features li::before {
    content: "\25B6"; color: #268bd2; position: absolute;
    left: 0; font-size: 8px; top: 2px;
  }
  .cta {
    background: #268bd2; color: #fdf6e3;
    padding: 10px 20px; border-radius: 6px;
    font-size: 13px; font-weight: 600;
    margin-top: auto;
    display: inline-block;
  }
</style>
</head>
<body>
  <a class="ad" href="https://github.com/andytischen/github-slideshow" target="_blank" rel="noopener">
    <div class="logo">GS</div>
    <h2>GitHub<br>Slideshow</h2>
    <div class="divider"></div>
    <p>Learn Git &amp; GitHub interactively</p>
    <ul class="features">
      <li>Hands-on slide decks</li>
      <li>Built with reveal.js</li>
      <li>Open source</li>
      <li>Fork &amp; customize</li>
    </ul>
    <div class="cta">Get Started</div>
  </a>
</body>
</html>
