<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>{% if post.title %}{{ post.title }} | {{ page.title }}{% else %}{{ site.title }}{% endif %}</title>

{% assign reveal_path = site.reveal_path | default: "node_modules/reveal.js" %}

<link rel="stylesheet" href="{{ site.baseurl }}/{{ reveal_path }}/css/reset.css">
<link rel="stylesheet" href="{{ site.baseurl }}/{{ reveal_path }}/css/reveal.css">
<link rel="stylesheet" href="{{ site.baseurl }}/{{ reveal_path }}/css/theme/moon.css">

<!-- Theme used for syntax highlighting of code -->
<link rel="stylesheet" href="{{ site.baseurl }}/{{ reveal_path }}/lib/css/monokai.css">

<!-- Printing and PDF exports -->
<script>
	(function() {
		var link = document.createElement( 'link' );
		link.rel = 'stylesheet';
		link.type = 'text/css';
		var revealPath = '{{ site.baseurl }}/{{ reveal_path }}';
		link.href = window.location.search.match( /print-pdf/gi ) ? revealPath + '/css/print/pdf.css' : revealPath + '/css/print/paper.css';
		link.onerror = function() {
			console.error('Failed to load print stylesheet: ' + link.href);
		};
		var head = document.getElementsByTagName( 'head' )[0];
		if (head) {
			head.appendChild( link );
		} else {
			console.error('No <head> element found — cannot inject print stylesheet.');
		}
	})();
</script>
